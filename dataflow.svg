<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" width="100%" height="100%" style="background-color: #fdfcff;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6750a4" flood-opacity="0.12" />
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6750a4" />
    </marker>
    <marker id="arrow-reverse" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#6750a4" />
    </marker>

    <style>
      text { font-family: 'Roboto', 'Segoe UI', sans-serif; font-size: 13px; fill: #1d192b; pointer-events: none; }
      .entity { fill: #e8def8; stroke: #6750a4; stroke-width: 2px; filter: url(#shadow); }
      .process { fill: #f3edf7; stroke: #6750a4; stroke-width: 2px; filter: url(#shadow); }
      .datastore { fill: #ffffff; stroke: #6750a4; stroke-width: 2px; filter: url(#shadow); }
      .external { fill: #ffe1e8; stroke: #b3261e; stroke-width: 2px; filter: url(#shadow); }
      .line { stroke: #6750a4; stroke-width: 1.5px; fill: none; stroke-linejoin: round; }
      .line-dashed { stroke: #6750a4; stroke-width: 1.5px; fill: none; stroke-linejoin: round; stroke-dasharray: 6,4; }
      .label-bg { fill: #fdfcff; rx: 4px; stroke: rgba(103,80,164,0.1); stroke-width: 1px; }
      .label-text { font-size: 12px; fill: #49454f; font-weight: 500; text-anchor: middle; }
      .bold { font-weight: 700; }
      .ds-id { font-weight: 800; fill: #6750a4; font-size: 14px; }
    </style>
  </defs>

  <path d="M 280 140 V 220 H 130 V 300" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />
  <path d="M 320 140 V 240 H 430 V 300" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />

  <path d="M 840 140 V 180 H 170 V 300" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />
  <path d="M 870 140 V 200 H 470 V 300" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />
  <path d="M 900 140 V 220 H 750 V 300" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />
  <path d="M 930 140 V 240 H 1050 V 300" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />

  <path d="M 150 380 V 650" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />
  <path d="M 450 380 V 650" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />
  <path d="M 750 380 V 650" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />
  <path d="M 1050 380 V 650" class="line" marker-start="url(#arrow-reverse)" marker-end="url(#arrow)" />

  <path d="M 700 380 V 490 H 480 V 650" class="line-dashed" marker-end="url(#arrow)" />
  <path d="M 1000 380 V 580 H 510 V 650" class="line-dashed" marker-end="url(#arrow)" />


  <rect x="145" y="210" width="120" height="20" class="label-bg" />
  <text x="205" y="224" class="label-text">Credentials &amp; Token</text>

  <rect x="335" y="230" width="100" height="20" class="label-bg" />
  <text x="385" y="244" class="label-text">Manage Catalog</text>

  <rect x="455" y="170" width="100" height="20" class="label-bg" />
  <text x="505" y="184" class="label-text">Auth &amp; Session</text>

  <rect x="625" y="190" width="100" height="20" class="label-bg" />
  <text x="675" y="204" class="label-text">Search / Tag Filter</text>

  <rect x="785" y="210" width="80" height="20" class="label-bg" />
  <text x="825" y="224" class="label-text">Borrow Book</text>

  <rect x="940" y="230" width="100" height="20" class="label-bg" />
  <text x="990" y="244" class="label-text">Prompt / Response</text>

  <rect x="110" y="520" width="80" height="20" class="label-bg" />
  <text x="150" y="534" class="label-text">User Data</text>

  <rect x="405" y="420" width="90" height="20" class="label-bg" />
  <text x="450" y="434" class="label-text">Book &amp; Tags</text>

  <rect x="705" y="520" width="90" height="20" class="label-bg" />
  <text x="750" y="534" class="label-text">Loan Records</text>

  <rect x="1005" y="520" width="90" height="20" class="label-bg" />
  <text x="1050" y="534" class="label-text">JSON Payload</text>

  <rect x="545" y="480" width="100" height="20" class="label-bg" />
  <text x="595" y="494" class="label-text">Update Stock (-/+)</text>

  <rect x="830" y="570" width="120" height="20" class="label-bg" />
  <text x="890" y="584" class="label-text">Read Book Context</text>


  <rect x="225" y="80" width="150" height="60" rx="6" class="entity" />
  <text x="300" y="115" text-anchor="middle" style="font-size:16px; font-weight:800; fill:#6750a4;">Admin</text>

  <rect x="825" y="80" width="150" height="60" rx="6" class="entity" />
  <text x="900" y="115" text-anchor="middle" style="font-size:16px; font-weight:800; fill:#6750a4;">Member</text>


  <rect x="70" y="300" width="160" height="80" rx="40" class="process" />
  <text x="150" y="340" text-anchor="middle" class="bold">Auth &amp; Profile</text>
  <text x="150" y="355" text-anchor="middle">Management</text>

  <rect x="370" y="300" width="160" height="80" rx="40" class="process" />
  <text x="450" y="340" text-anchor="middle" class="bold">Books &amp; Catalog</text>
  <text x="450" y="355" text-anchor="middle">Processing</text>

  <rect x="670" y="300" width="160" height="80" rx="40" class="process" />
  <text x="750" y="340" text-anchor="middle" class="bold">Loan &amp; Returns</text>
  <text x="750" y="355" text-anchor="middle">Engine</text>

  <rect x="970" y="300" width="160" height="80" rx="40" class="process" />
  <text x="1050" y="340" text-anchor="middle" class="bold">ElysiaAI</text>
  <text x="1050" y="355" text-anchor="middle">Query Parsing</text>


  <rect x="70" y="650" width="160" height="60" class="datastore" />
  <path d="M 110 650 V 710" class="line" />
  <text x="90" y="685" text-anchor="middle" class="ds-id">D1</text>
  <text x="170" y="685" text-anchor="middle" class="bold">users.db</text>

  <rect x="370" y="650" width="160" height="60" class="datastore" />
  <path d="M 410 650 V 710" class="line" />
  <text x="390" y="685" text-anchor="middle" class="ds-id">D2</text>
  <text x="470" y="685" text-anchor="middle" class="bold">books.db</text>

  <rect x="670" y="650" width="160" height="60" class="datastore" />
  <path d="M 710 650 V 710" class="line" />
  <text x="690" y="685" text-anchor="middle" class="ds-id">D3</text>
  <text x="770" y="685" text-anchor="middle" class="bold">loans.db</text>

  <rect x="970" y="650" width="160" height="60" rx="6" class="external" />
  <text x="1050" y="675" text-anchor="middle" class="bold" fill="#b3261e">Google Gemini</text>
  <text x="1050" y="692" text-anchor="middle" fill="#b3261e" style="font-size: 11px;">(External REST API)</text>

</svg>
