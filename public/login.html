<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Elysia Perpus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <script type="importmap">
    { "imports": { "@material/web/": "https://esm.run/@material/web/" } }
    </script>
    <script type="module">
        import '@material/web/all.js';
        import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
        document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    </script>

    <style>
        :not(:defined) {
            display: none !important;
        }

        :root { 
            --md-sys-color-background: #fdfcff; 
            --md-sys-color-surface: #f3edf7; 
            --md-sys-color-primary: #6750a4; 
            --md-sys-color-outline: #cac4d0; 
        }
        
        body { 
            background: linear-gradient(135deg, var(--md-sys-color-background) 0%, #eaddff 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            animation: fadeInBody 0.4s ease forwards;
        }

        @keyframes fadeInBody {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card { 
            background-color: white; 
            border: 1px solid var(--md-sys-color-outline);
            border-radius: 28px; 
            padding: 48px 32px; 
            width: 100%; 
            max-width: 360px; 
            text-align: center; 
            box-shadow: 0 12px 40px rgba(103, 80, 164, 0.12);
            animation: slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-icon {
            font-size: 64px;
            color: var(--md-sys-color-primary);
            margin-bottom: 8px;
        }

        .title {
            color: var(--md-sys-color-primary);
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #666;
            margin: 8px 0 0 0;
            font-size: 14px;
        }

        form { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            margin-top: 32px;
        }
        
        md-outlined-text-field { width: 100%; }
        
        md-dialog { z-index: 1000; position: fixed; }
        md-dialog::part(container) { border-radius: 24px; box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2); }
    </style>
</head>
<body>
    
    <div class="card">
        <span class="material-symbols-outlined logo-icon">menu_book</span>
        <h1 class="title">Elysia Perpus</h1>
        <p class="subtitle">Silakan masuk ke akun Anda</p>

        <form onsubmit="event.preventDefault(); prosesLogin();">
            <md-outlined-text-field id="username" label="Username" required>
                <md-icon slot="leading-icon">person</md-icon>
            </md-outlined-text-field>
            
            <md-outlined-text-field id="password" label="Password" type="password" required>
                <md-icon slot="leading-icon">lock</md-icon>
            </md-outlined-text-field>
            
            <md-filled-button id="btnLogin" type="submit" style="width: 100%; margin-top: 12px; height: 48px; font-size: 16px;">
                Masuk
            </md-filled-button>
        </form>
        
        <div style="margin-top: 32px;">
            <p style="font-size: 14px; color: #666; margin-bottom: 8px;">Belum memiliki akun?</p>
            <md-text-button onclick="window.location.href='/register.html'">Daftar Sekarang</md-text-button>
        </div>
    </div>

    <md-dialog id="dlg">
        <div slot="headline" style="color: #b3261e; display: flex; align-items: center; gap: 8px;">
            <span class="material-symbols-outlined">error</span> Login Gagal
        </div>
        <div slot="content" id="dlgMsg" style="color: #49454f;"></div>
        <div slot="actions">
            <md-filled-button onclick="dlg.close()" style="--md-sys-color-primary: #b3261e;">Coba Lagi</md-filled-button>
        </div>
    </md-dialog>

    <script>
        async function prosesLogin() {
            const btn = document.getElementById('btnLogin');
            const userEl = document.getElementById('username');
            const passEl = document.getElementById('password');
            const dlg = document.getElementById('dlg');
            const dlgMsg = document.getElementById('dlgMsg');

            btn.disabled = true;
            btn.innerText = "Memproses...";

            try {
                const res = await fetch('/api/login', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userEl.value, password: passEl.value })
                });
                
                const data = await res.json();
                
                if (data.status === 'sukses') {
                    btn.innerText = "Berhasil!";
                    localStorage.setItem('savedMemberId', data.memberId);
                    localStorage.setItem('username', data.username);
                    
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 500);
                } else {
                    btn.disabled = false;
                    btn.innerText = "Masuk";
                    dlgMsg.innerText = data.message;
                    dlg.show();
                }
            } catch (e) {
                btn.disabled = false;
                btn.innerText = "Masuk";
                dlgMsg.innerText = "Terjadi kesalahan koneksi ke server.";
                dlg.show();
            }
        }
    </script>
</body>
</html>
