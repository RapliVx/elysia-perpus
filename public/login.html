<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Masuk - Elysia Perpus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <script type="importmap">
    { "imports": { "@material/web/": "https://esm.run/@material/web/" } }
    </script>
    <script type="module">
        import '@material/web/all.js';
        import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
        document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    </script>

    <style>
        :not(:defined) {
            display: none !important;
        }

        :root { 
            --md-sys-color-background: #fdfcff; 
            --md-sys-color-surface: #f3edf7; 
            --md-sys-color-primary: #6750a4; 
            --md-sys-color-outline: #cac4d0; 
        }
        
        body { 
            background: linear-gradient(-45deg, #eaddff, #fdfcff, #f3edf7, #d0bcff);
            background-size: 400% 400%;
            animation: gradientBG 16s ease infinite, fadeInBody 0.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            overflow: hidden;
            position: relative;
        }

        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            transition: all 0.8s ease;
        }
        body::before {
            width: 350px; height: 350px;
            background: #d0bcff;
            top: -50px; left: -50px;
        }
        body::after {
            width: 450px; height: 450px;
            background: #eaddff;
            bottom: -100px; right: -50px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInBody {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 32px; 
            padding: 48px 36px; 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            box-shadow: 0 24px 64px rgba(103, 80, 164, 0.06), inset 0 1px 2px rgba(255, 255, 255, 0.5);
            animation: smoothSlideUp 0.8s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
            position: relative;
            z-index: 1;
            box-sizing: border-box;
        }

        @keyframes smoothSlideUp {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-icon {
            font-size: 72px;
            background: linear-gradient(135deg, var(--md-sys-color-primary), #9c27b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            animation: smoothFloat 5s ease-in-out infinite;
        }

        @keyframes smoothFloat {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(-2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .title {
            margin: 0;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--md-sys-color-primary), #56428f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #49454f;
            margin: 8px 0 0 0;
            font-size: 15px;
            font-weight: 500;
        }

        form { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            margin-top: 36px;
        }
        
        md-outlined-text-field { 
            width: 100%; 
            --md-outlined-text-field-container-shape: 16px;
            transition: all 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        
        #btnLogin {
            width: 100%; 
            margin-top: 12px; 
            height: 52px; 
            border-radius: 26px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1), box-shadow 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        #btnLogin:not([disabled]):hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(103, 80, 164, 0.2);
        }

        #btnLogin:not([disabled]):active {
            transform: translateY(0px);
        }
        
        .register-container {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px dashed var(--md-sys-color-outline);
        }

        .lang-layer {
            position: absolute; 
            top: 20px; 
            right: 20px; 
            z-index: 100;
            animation: fadeInBody 1s ease forwards;
        }

        md-dialog { z-index: 1000; position: fixed; }
        md-dialog::part(container) { border-radius: 28px; box-shadow: 0 24px 48px rgba(0, 0, 0, 0.2); background: var(--md-sys-color-surface); }
    </style>
</head>
<body>
    
    <div class="lang-layer">
        <md-filled-tonal-button onclick="toggleLanguage()" style="--md-filled-tonal-button-container-shape: 12px;">
            <md-icon slot="icon">translate</md-icon>
            <span id="langToggleText" data-i18n="toggle_lang">English</span>
        </md-filled-tonal-button>
    </div>
    
    <div class="card">
        <span class="material-symbols-outlined logo-icon">menu_book</span>
        <h1 class="title" data-i18n="app_title">Elysia Perpus</h1>
        <p class="subtitle" data-i18n="login_subtitle">Silakan masuk ke akun Anda</p>

        <form onsubmit="event.preventDefault(); prosesLogin();">
            <md-outlined-text-field id="username" label="Username" data-i18n="username_label" required>
                <md-icon slot="leading-icon">person</md-icon>
            </md-outlined-text-field>
            
            <md-outlined-text-field id="password" label="Password" data-i18n="password_label" type="password" required>
                <md-icon slot="leading-icon">lock</md-icon>
            </md-outlined-text-field>
            
            <md-filled-button id="btnLogin" type="submit">
                <span id="btnLoginText" data-i18n="btn_login">Masuk</span>
            </md-filled-button>
        </form>
        
        <div class="register-container">
            <p style="font-size: 14px; color: #49454f; margin: 0 0 12px 0;" data-i18n="no_account_msg">Belum memiliki akun?</p>
            <md-text-button onclick="window.location.href='/register.html'" style="width: 100%;" data-i18n="btn_register">
                Daftar Sekarang
            </md-text-button>
        </div>
    </div>

    <md-dialog id="dlg">
        <div slot="headline" style="color: #b3261e; display: flex; align-items: center; gap: 8px;">
            <span class="material-symbols-outlined">error</span> <span data-i18n="login_failed_title">Login Gagal</span>
        </div>
        <div slot="content" id="dlgMsg" style="color: #49454f; font-size: 15px; line-height: 1.5;"></div>
        <div slot="actions">
            <md-filled-button onclick="dlg.close()" style="--md-sys-color-primary: #b3261e;" data-i18n="btn_retry">Coba Lagi</md-filled-button>
        </div>
    </md-dialog>

    <script>
        let i18nData = {};
        let currentLang = localStorage.getItem('appLang') || 'id';

        async function initI18n() {
            try {
                const res = await fetch('/language.json');
                i18nData = await res.json();
                applyTranslations();
            } catch (e) { console.error("Gagal memuat bahasa JSON", e); }
        }

        function applyTranslations() {
            const dict = i18nData[currentLang];
            if(!dict) return;
            
            if (dict['login_page_title']) {
                document.getElementById('pageTitle').innerText = dict['login_page_title'];
            }

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) {
                    if (el.tagName === 'MD-OUTLINED-TEXT-FIELD') {
                        el.label = dict[key];
                    } else if (el.tagName === 'INPUT' && el.placeholder !== undefined) {
                        el.placeholder = dict[key];
                    } else {
                        el.innerHTML = dict[key]; 
                    }
                }
            });
        }

        function t(key) {
            return (i18nData[currentLang] && i18nData[currentLang][key]) ? i18nData[currentLang][key] : key;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'id' ? 'en' : 'id';
            localStorage.setItem('appLang', currentLang);
            applyTranslations();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await initI18n();
        });

        async function prosesLogin() {
            const btn = document.getElementById('btnLogin');
            const btnText = document.getElementById('btnLoginText');
            const userEl = document.getElementById('username');
            const passEl = document.getElementById('password');
            const dlg = document.getElementById('dlg');
            const dlgMsg = document.getElementById('dlgMsg');

            btn.disabled = true;
            btnText.innerText = t('login_processing');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userEl.value, password: passEl.value })
                });
                
                const data = await res.json();
                
                if (data.status === 'sukses') {
                    btnText.innerText = t('login_success');
                    localStorage.setItem('savedMemberId', data.memberId);
                    localStorage.setItem('username', data.username);
                    
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 400);
                } else {
                    btn.disabled = false;
                    btnText.innerText = t('btn_login');
                    dlgMsg.innerText = data.message;
                    dlg.show();
                }
            } catch (e) {
                btn.disabled = false;
                btnText.innerText = t('btn_login');
                dlgMsg.innerText = t('login_conn_error');
                dlg.show();
            }
        }
    </script>
</body>
</html>
